name: Sentinel API Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/sentinel-api/**'
      - 'packages/**'
      - 'infra/docker/sentinel-api/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Sentinel API
        run: pnpm --filter sentinel-api build

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINER_REGISTRY_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY_NAME }}
          AZURE_CONTAINER_REGISTRY_ENDPOINT: ${{ vars.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
          SENTINEL_CONTAINER_APP_NAME: ${{ vars.SENTINEL_CONTAINER_APP_NAME }}
          SENTINEL_IMAGE_REPOSITORY: ${{ vars.SENTINEL_IMAGE_REPOSITORY }}
        run: |
          IMAGE_TAG="gha-${GITHUB_SHA}"
          IMAGE_URI="${AZURE_CONTAINER_REGISTRY_ENDPOINT}/${SENTINEL_IMAGE_REPOSITORY}:${IMAGE_TAG}"

          az acr build \
            --registry "$AZURE_CONTAINER_REGISTRY_NAME" \
            --image "${SENTINEL_IMAGE_REPOSITORY}:${IMAGE_TAG}" \
            --file infra/docker/sentinel-api/Dockerfile \
            .

          az containerapp update \
            --name "$SENTINEL_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE_URI"
